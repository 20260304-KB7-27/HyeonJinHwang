<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <fieldset>
      <legend>회원가입</legend>
      <table>
        <tr>
          <td><label for="user_id">사용자 ID</label></td>
          <td><input id="user_id" type="text" /></td>
        </tr>
        <tr>
          <td><label for="user_pw">비밀번호</label></td>
          <td><input id="user_pw" type="password" /></td>
        </tr>
        <tr>
          <td><label for="pw_double_check">비밀번호 확인</label></td>
          <td><input id="pw_double_check" type="password" /></td>
        </tr>
        <tr>
          <td><label for="user_name">이름</label></td>
          <td><input id="user_name" type="text" /></td>
        </tr>
        <tr>
          <td>성별</td>
          <td>
            <input id="man" type="radio" name="gender" value="m" />
            <label for="man">남자</label>
            <input id="woman" type="radio" name="gender" value="w" />
            <label for="woman">여자</label>
          </td>
        </tr>
        <tr>
          <td>취미</td>
          <td>
            <input id="football" type="checkbox" value="football" />
            <label for="football">축구</label>
            <input id="baseball" type="checkbox" value="baseball" />
            <label for="baseball">야구</label>
            <input id="volleyball" type="checkbox" value="volleyball" />
            <label for="volleyball">배구</label>
            <input id="basketball" type="checkbox" value="basketball" />
            <label for="basketball">야구</label>
          </td>
        </tr>
        <tr>
          <td><label for="user_email">이메일</label></td>
          <td><input id="user_email" type="email" /></td>
        </tr>
        <tr>
          <td>역할</td>
          <td>
            <select>
              <option>ADMIN</option>
              <option>관리자</option>
              <option>일반회원</option>
            </select>
          </td>
        </tr>
      </table>
      <input type="submit" value="확인" />
      <input type="reset" value="다시쓰기" />
    </fieldset>
  </body>
</html>
