<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        margin-top: 50px;
        margin-left: 50px;
      }

      /* 
        position: fixed -> 고정 레이아웃

        특징
          - 스크롤을 내려도 화면의 특정 위치에 고정
          - 일반적인 문서 흐름에서 제외되며 다른 요소들의 위치를 무시함
       */

      .top_bar {
        background-color: yellow;
        height: 50px;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
      }

      .left_bar {
        background-color: blue;
        width: 50px;
        position: fixed;
        top: 50px;
        left: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="top_bar"></div>
    <div class="left_bar"></div>
    <div class="container">
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. A, sequi saepe
        ratione dignissimos alias praesentium, ex pariatur laboriosam animi modi
        placeat officia consequuntur aspernatur. Voluptatem dolor porro mollitia
        tempore consequatur?
      </p>
    </div>
  </body>
</html>
