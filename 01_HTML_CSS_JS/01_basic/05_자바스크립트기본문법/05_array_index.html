<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 메모리 구조: 스택 + 힙
      // value는 스택에 5라는 값이 저장되는 것이다.
      // array는 힙에 저장을 하고 그 힙의 주소값이 스택에 저장된다.
      let value = 5;
      let array = [10, 20, 30, 40, 50];

      console.log(array.length);

      // console.log(array[0]);

      for (let i = 0; i < array.length; i++) {
        alert(array[i]);
      }

      // for ...of 반복문: 배열의 요소를 직접 순회
      for (let v of array) {
        alert(value);
      }

      // forEach: 배열의 길이만큼 함수를 실행
      // 배열의 각 원소를 콜백함수의 인자로 넘겨줄 수 있음.
      array.forEach(function callbackfunc(value) {
        alert(value);
      });
    </script>
  </head>

  <body></body>
</html>
