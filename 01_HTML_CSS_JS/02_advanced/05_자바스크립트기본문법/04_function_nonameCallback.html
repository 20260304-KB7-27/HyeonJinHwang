<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function callbacktimes(num, callback) {
        for (let i = 0; i < num; i++) {
          callback();
        }
      }

      callbacktimes(3, function () {
        alert('함수 호출');
      });
    </script>
  </head>

  <body></body>
</html>
